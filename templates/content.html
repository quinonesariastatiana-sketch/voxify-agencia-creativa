<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voxify — Contenido</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#090912;--card:#12121f;--nav:#0d0d1a;--purple:#635BFF;--cyan:#06d6a0;--red:#ef4444;--yellow:#f59e0b;--muted:rgba(255,255,255,.4);--border:rgba(255,255,255,.08);--text:rgba(255,255,255,.88)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
a{color:inherit;text-decoration:none}

nav{background:var(--nav);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:32px;position:sticky;top:0;z-index:100}
.nav-brand{font-weight:800;font-size:16px;color:#fff;letter-spacing:-.5px}
.nav-brand span{color:var(--purple)}
.nav-links a{padding:6px 14px;border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;transition:.15s}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-links a.active{color:var(--purple);background:rgba(99,91,255,.18)}

.page{padding:28px 32px;max-width:1300px;margin:0 auto}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;margin-right:8px}
select{background:#1a1a2e;border:1px solid var(--border);border-radius:10px;color:#fff;padding:8px 14px;font-size:13px;cursor:pointer}
select:focus{outline:none;border-color:var(--purple)}
.btn{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.btn-generate{background:var(--purple);color:#fff}
.btn-generate:hover{background:#7c75ff}
.btn-generate:disabled{opacity:.5;cursor:not-allowed}
.filter-btns{display:flex;gap:6px;margin-left:auto}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.filter-btn:hover{color:#fff;border-color:rgba(99,91,255,.4)}
.filter-btn.active{background:rgba(99,91,255,.15);color:var(--purple);border-color:rgba(99,91,255,.3)}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.caption-cell{max-width:360px}
.caption-text{font-size:13px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.caption-expand{font-size:11px;color:var(--purple);cursor:pointer;margin-top:2px}
.platform-badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;background:rgba(99,91,255,.15);color:#a5b4fc;white-space:nowrap}
.type-post{background:rgba(99,91,255,.12);color:#a5b4fc}
.type-reel{background:rgba(239,68,68,.1);color:#f87171}
.type-story{background:rgba(245,158,11,.1);color:var(--yellow)}
.type-carousel{background:rgba(6,214,160,.1);color:var(--cyan)}
.type-badge{font-size:10px;padding:2px 7px;border-radius:12px;font-weight:700;white-space:nowrap}
.status-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;white-space:nowrap}
.s-pending{background:rgba(245,158,11,.12);color:var(--yellow)}
.s-approved{background:rgba(6,214,160,.12);color:var(--cyan)}
.s-posted{background:rgba(99,91,255,.12);color:#a5b4fc}
.s-rejected,.s-failed,.s-deleted{background:rgba(239,68,68,.1);color:var(--red)}
.actions{display:flex;gap:5px;white-space:nowrap}
.act-btn{padding:5px 10px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:.15s}
.act-approve{background:rgba(6,214,160,.15);color:var(--cyan)}
.act-approve:hover{background:rgba(6,214,160,.3)}
.act-reject{background:rgba(239,68,68,.08);color:var(--red)}
.act-reject:hover{background:rgba(239,68,68,.2)}
.act-publish{background:var(--purple);color:#fff}
.act-publish:hover{background:#7c75ff}
.act-delete{background:rgba(255,255,255,.06);color:var(--muted)}
.act-delete:hover{background:rgba(255,255,255,.1)}
.empty{color:var(--muted);text-align:center;padding:48px;font-size:13px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:480px;padding:28px;position:relative}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px}
input,textarea,select.modal-select{background:#1a1a2e;border:1px solid var(--border);border-radius:10px;color:#fff;padding:10px 14px;font-size:13px;width:100%;font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:var(--purple)}
textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{background:rgba(255,255,255,.06);color:var(--muted);border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer}
.btn-cancel:hover{color:#fff}

/* GENERATED PREVIEW */
.preview-box{background:rgba(99,91,255,.08);border:1px solid rgba(99,91,255,.2);border-radius:12px;padding:14px;margin:14px 0;font-size:13px;line-height:1.6;white-space:pre-wrap;display:none}

#toast{position:fixed;bottom:24px;right:24px;background:#1e1e2e;border:1px solid var(--border);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:999}
#toast.show{opacity:1}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">⚡ <span>Voxify</span></div>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/brands">Marcas</a>
    <a href="/content" class="active">Contenido</a>
  </div>
</nav>

<div class="page">
  <div class="top-bar">
    <div class="page-title">Contenido</div>
    <select id="brand-filter" onchange="loadPosts()">
      <option value="">Todas las marcas</option>
      {% for b in brands %}
      <option value="{{ b.id }}">{{ b.name }}</option>
      {% endfor %}
    </select>
    <button class="btn btn-generate" onclick="openGenerateModal()">⚡ Post único</button>
    <button class="btn btn-generate" style="background:#06d6a0;margin-left:4px" onclick="openGridModal()">📅 Generar parrilla</button>
    <div class="filter-btns">
      <button class="filter-btn active" data-status="" onclick="setFilter(this,'')">Todos</button>
      <button class="filter-btn" data-status="pending" onclick="setFilter(this,'pending')">Pendientes</button>
      <button class="filter-btn" data-status="approved" onclick="setFilter(this,'approved')">Aprobados</button>
      <button class="filter-btn" data-status="posted" onclick="setFilter(this,'posted')">Publicados</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>MARCA</th><th>CAPTION</th><th>TIPO</th><th>PLATAFORMA</th>
          <th>DÍA / HORA</th><th>ESTADO</th><th>ACCIONES</th>
        </tr>
      </thead>
      <tbody id="posts-table"></tbody>
    </table>
  </div>
</div>

<!-- Generate modal -->
<div class="modal-overlay" id="gen-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">⚡ Generar post con IA</div>
    <div class="field">
      <label>MARCA</label>
      <select id="gen-brand" class="modal-select">
        {% for b in brands %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="field">
      <label>PLATAFORMA</label>
      <select id="gen-platform" class="modal-select">
        <option value="instagram">Instagram</option>
        <option value="facebook">Facebook</option>
        <option value="both">Instagram + Facebook</option>
      </select>
    </div>
    <div class="field">
      <label>TEMA (opcional)</label>
      <input id="gen-topic" placeholder="ej: lanzamiento de producto, tips, motivación...">
    </div>
    <div class="preview-box" id="gen-preview"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-generate" id="gen-btn" onclick="generatePost()">⚡ Generar y guardar</button>
    </div>
  </div>
</div>

<!-- Grid modal -->
<div class="modal-overlay" id="grid-modal" style="display:none" onclick="if(event.target===this)closeGridModal()">
  <div class="modal" style="width:540px;max-height:90vh;overflow-y:auto">
    <div class="modal-title">📅 Generar Parrilla de Contenido</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field">
        <label>MARCA</label>
        <select id="grid-brand" class="modal-select">
          {% for b in brands %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="field">
        <label>SEMANAS</label>
        <select id="grid-weeks" class="modal-select">
          <option value="1">1 semana</option>
          <option value="2">2 semanas</option>
          <option value="4">4 semanas</option>
        </select>
      </div>
      <div class="field">
        <label>PLATAFORMAS</label>
        <div style="display:flex;gap:10px;padding-top:6px">
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:400;color:var(--text)">
            <input type="checkbox" id="grid-ig" checked style="accent-color:#635BFF"> Instagram
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:12px;font-weight:400;color:var(--text)">
            <input type="checkbox" id="grid-fb" style="accent-color:#635BFF"> Facebook
          </label>
        </div>
      </div>
      <div class="field">
        <label>TEMA (opcional)</label>
        <input id="grid-topic" placeholder="ej: temporada navideña...">
      </div>
      <div class="field">
        <label>IMÁGENES IA</label>
        <label style="display:flex;align-items:center;gap:8px;padding-top:6px;font-size:12px;font-weight:400;color:var(--text);cursor:pointer">
          <input type="checkbox" id="grid-images" style="accent-color:#635BFF">
          🎬 Generar fotos + videos con fal.ai <span style="color:var(--muted)">(posts=foto, reels/stories=video)</span>
        </label>
      </div>
    </div>
    <div style="background:#1a1a2e;border-radius:10px;padding:14px;margin:4px 0 14px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px">CONTENIDO POR SEMANA</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field" style="margin:0"><label>📸 Posts</label>
          <input type="number" id="grid-posts" value="3" min="0" max="7" style="padding:7px 10px"></div>
        <div class="field" style="margin:0"><label>🎬 Reels</label>
          <input type="number" id="grid-reels" value="2" min="0" max="7" style="padding:7px 10px"></div>
        <div class="field" style="margin:0"><label>⭕ Stories</label>
          <input type="number" id="grid-stories" value="5" min="0" max="14" style="padding:7px 10px"></div>
        <div class="field" style="margin:0"><label>🎠 Carruseles</label>
          <input type="number" id="grid-carousels" value="1" min="0" max="4" style="padding:7px 10px"></div>
      </div>
    </div>
    <div id="grid-preview" style="display:none;margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px">VISTA PREVIA</div>
      <div id="grid-preview-items"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeGridModal()">Cancelar</button>
      <button class="btn btn-generate" id="grid-gen-btn" onclick="generateGrid()">📅 Generar parrilla</button>
      <button class="btn btn-generate" id="grid-save-btn" style="display:none;background:#06d6a0" onclick="saveGrid()">💾 Guardar todos</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Initial data from server ───────────────────────────────────────────────
const initialPosts = {{ posts | tojson }};
let allPosts = initialPosts;
let currentStatus = '';
let currentBrand = '';

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = err ? '#ef4444' : 'rgba(255,255,255,.12)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function setFilter(btn, status) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus = status;
  loadPosts();
}

async function loadPosts() {
  currentBrand = document.getElementById('brand-filter').value;
  let url = `/api/posts?limit=200`;
  if (currentBrand) url += `&brand_id=${currentBrand}`;
  if (currentStatus) url += `&status=${currentStatus}`;
  const r = await fetch(url);
  allPosts = await r.json();
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('posts-table');
  if (!allPosts.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty">Sin posts${currentStatus ? ' con estado "' + currentStatus + '"' : ''}</div></td></tr>`;
    return;
  }
  tbody.innerHTML = allPosts.map(p => `
  <tr id="row-${p.id}">
    <td style="color:var(--muted);font-size:12px">#${p.id}</td>
    <td><span style="color:${p.brand_color||'#635BFF'};font-weight:700;font-size:13px">${p.brand_name||p.brand_id}</span></td>
    <td class="caption-cell" style="display:flex;gap:8px;align-items:flex-start">
      ${p.video_url
        ? `<video src="${p.video_url}" style="width:44px;height:44px;object-fit:cover;border-radius:5px;flex-shrink:0" autoplay muted loop playsinline></video>`
        : p.image_url
          ? `<img src="${p.image_url}" style="width:44px;height:44px;object-fit:cover;border-radius:5px;flex-shrink:0">`
          : ''}
      <div style="flex:1;min-width:0">
        <div class="caption-text" id="cap-${p.id}">${escHtml(p.caption)}</div>
        <div class="caption-expand" onclick="toggleCaption(${p.id})">Ver más</div>
      </div>
    </td>
    <td><span class="type-badge type-${p.content_type||'post'}">${typeLabel(p.content_type)}</span></td>
    <td><span class="platform-badge">${p.platform}</span></td>
    <td style="color:var(--muted);font-size:11px;white-space:nowrap">${fmtDate(p)}</td>
    <td><span class="status-badge s-${p.status}">${statusLabel(p.status)}</span></td>
    <td class="actions">${actionsFor(p)}</td>
  </tr>`).join('');
}

function fmtDate(p) {
  // prefer scheduled_for (real date), then day+time label, then created_at
  if (p.scheduled_for) {
    const d = new Date(p.scheduled_for.replace(' ','T') + 'Z');
    return d.toLocaleDateString('es', {weekday:'short',month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('es', {hour:'2-digit',minute:'2-digit'});
  }
  if (p.suggested_day) return p.suggested_day + ' ' + (p.suggested_time||'');
  return (p.posted_at||p.created_at||'').slice(0,16);
}
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function statusLabel(s) { return {pending:'Pendiente',approved:'Aprobado',posted:'Publicado',rejected:'Rechazado',failed:'Fallido',deleted:'Eliminado'}[s]||s; }
function typeLabel(t) { return {post:'📸 Post',reel:'🎬 Reel',story:'⭕ Story',carousel:'🎠 Carrusel'}[t||'post']||t||'Post'; }
function actionsFor(p) {
  const acts = [];
  if (p.status === 'pending') {
    acts.push(`<button class="act-btn act-approve" onclick="approvePost(${p.id})">✓ Aprobar</button>`);
    acts.push(`<button class="act-btn act-reject" onclick="rejectPost(${p.id})">✗</button>`);
  }
  if (p.status === 'approved') {
    acts.push(`<button class="act-btn act-publish" onclick="publishPost(${p.id})">↑ Publicar</button>`);
  }
  if (!['deleted','posted'].includes(p.status)) {
    if (!p.image_url && !p.video_url) {
      acts.push(`<button class="act-btn" style="background:rgba(99,91,255,.12);color:#a5b4fc" id="media-btn-${p.id}" onclick="generateMedia(${p.id},this)">${['reel','story'].includes(p.content_type) ? '🎬' : '🖼'} Media</button>`);
    }
    acts.push(`<button class="act-btn act-delete" onclick="deletePost(${p.id})">🗑</button>`);
  }
  return acts.join('');
}

function toggleCaption(id) {
  const el = document.getElementById(`cap-${id}`);
  const expanded = el.style.webkitLineClamp === 'unset';
  el.style.webkitLineClamp = expanded ? '2' : 'unset';
  el.style.overflow = expanded ? 'hidden' : 'visible';
  el.nextElementSibling.textContent = expanded ? 'Ver más' : 'Ver menos';
}

async function approvePost(id) {
  const r = await fetch(`/api/posts/${id}/approve`, {method:'POST'});
  const d = await r.json();
  if (d.success) { toast('✓ Post aprobado'); loadPosts(); }
  else toast('Error: ' + d.error, true);
}

async function rejectPost(id) {
  const r = await fetch(`/api/posts/${id}/reject`, {method:'POST'});
  const d = await r.json();
  if (d.success) { toast('Post rechazado'); loadPosts(); }
  else toast('Error: ' + d.error, true);
}

async function publishPost(id) {
  const btn = document.querySelector(`#row-${id} .act-publish`);
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  const r = await fetch(`/api/posts/${id}/publish`, {method:'POST'});
  const d = await r.json();
  if (d.success) { toast('✓ Publicado en Meta'); loadPosts(); }
  else toast('Error: ' + (d.errors||[]).join(', '), true);
}

async function generateMedia(id, btn) {
  if (btn) { btn.disabled = true; btn.textContent = '⏳...'; }
  try {
    const r = await fetch(`/api/posts/${id}/generate-media`, {method:'POST'});
    const d = await r.json();
    if (d.success) {
      toast(`✓ Media generada`);
      loadPosts();
    } else {
      toast('Error: ' + d.error, true);
      if (btn) { btn.disabled = false; btn.textContent = btn.textContent.replace('⏳...', btn.dataset.label || '🖼 Media'); }
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
    if (btn) { btn.disabled = false; }
  }
}

async function deletePost(id) {
  if (!confirm('¿Eliminar este post?')) return;
  await fetch(`/api/posts/${id}`, {method:'DELETE'});
  toast('Post eliminado');
  loadPosts();
}

// ── Generate modal ────────────────────────────────────────────────────────────
function openGenerateModal() {
  const sel = document.getElementById('brand-filter').value;
  if (sel) document.getElementById('gen-brand').value = sel;
  document.getElementById('gen-topic').value = '';
  document.getElementById('gen-preview').style.display = 'none';
  document.getElementById('gen-btn').textContent = '⚡ Generar y guardar';
  document.getElementById('gen-btn').disabled = false;
  document.getElementById('gen-modal').style.display = 'flex';
}
function closeModal() { document.getElementById('gen-modal').style.display = 'none'; }

async function generatePost() {
  const brandId = document.getElementById('gen-brand').value;
  if (!brandId) { toast('Selecciona una marca', true); return; }
  const platform = document.getElementById('gen-platform').value;
  const topic    = document.getElementById('gen-topic').value;
  const btn      = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Generando...';

  try {
    const r = await fetch(`/api/generate/${brandId}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({platform, topic, save: true}),
    });
    const d = await r.json();
    if (d.success && d.post?.caption) {
      const preview = document.getElementById('gen-preview');
      preview.textContent = d.post.caption;
      preview.style.display = 'block';
      btn.textContent = '✓ Guardado — Cerrar';
      btn.onclick = () => { closeModal(); loadPosts(); };
      btn.disabled = false;
      toast(`✓ Post generado para ${brandId}`);
    } else {
      toast('Error generando post', true);
      btn.textContent = '⚡ Generar y guardar';
      btn.disabled = false;
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
    btn.textContent = '⚡ Generar y guardar';
    btn.disabled = false;
  }
}

// ── Grid modal ────────────────────────────────────────────────────────────────
let lastGrid = [];

function openGridModal() {
  const sel = document.getElementById('brand-filter').value;
  if (sel) document.getElementById('grid-brand').value = sel;
  document.getElementById('grid-preview').style.display = 'none';
  document.getElementById('grid-save-btn').style.display = 'none';
  document.getElementById('grid-gen-btn').textContent = '📅 Generar parrilla';
  document.getElementById('grid-gen-btn').disabled = false;
  document.getElementById('grid-modal').style.display = 'flex';
}
function closeGridModal() { document.getElementById('grid-modal').style.display = 'none'; }

async function generateGrid() {
  const brandId = document.getElementById('grid-brand').value;
  if (!brandId) { toast('Selecciona una marca', true); return; }
  const btn = document.getElementById('grid-gen-btn');
  const genImages = document.getElementById('grid-images').checked;
  btn.disabled = true;
  btn.textContent = genImages ? 'Generando + fotos... (puede tardar 60s)' : 'Generando... (puede tardar 30s)';

  const platforms = [];
  if (document.getElementById('grid-ig').checked) platforms.push('instagram');
  if (document.getElementById('grid-fb').checked) platforms.push('facebook');
  if (!platforms.length) platforms.push('instagram');

  const payload = {
    weeks:           parseInt(document.getElementById('grid-weeks').value),
    post_count:      parseInt(document.getElementById('grid-posts').value),
    reel_count:      parseInt(document.getElementById('grid-reels').value),
    story_count:     parseInt(document.getElementById('grid-stories').value),
    carousel_count:  parseInt(document.getElementById('grid-carousels').value),
    platforms,
    topic:           document.getElementById('grid-topic').value,
    generate_images: genImages,
    save:            false,
  };

  try {
    const r = await fetch(`/api/generate-grid/${brandId}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (d.success && d.grid?.length) {
      lastGrid = d.grid;
      renderGridPreview(d.grid);
      document.getElementById('grid-save-btn').style.display = 'inline-block';
      btn.textContent = '🔄 Regenerar';
      btn.disabled = false;
      toast(`✓ ${d.total} piezas generadas`);
    } else {
      toast('Error generando parrilla: ' + (d.errors||[]).join(', '), true);
      btn.textContent = '📅 Generar parrilla';
      btn.disabled = false;
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
    btn.textContent = '📅 Generar parrilla';
    btn.disabled = false;
  }
}

function renderGridPreview(grid) {
  const typeColors = {post:'#a5b4fc',reel:'#f87171',story:'#f59e0b',carousel:'#06d6a0'};
  const html = grid.map(item => `
    <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid ${typeColors[item.content_type]||'#635BFF'};display:flex;gap:10px">
      ${item.video_url
        ? `<video src="${item.video_url}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0" autoplay muted loop playsinline></video>`
        : item.image_url
          ? `<img src="${item.image_url}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'">`
          : ''
      }
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-size:10px;font-weight:700;color:${typeColors[item.content_type]||'#635BFF'}">${typeLabel(item.content_type).toUpperCase()}</span>
          <span style="font-size:10px;color:var(--muted)">${item.scheduled_for ? item.scheduled_for.slice(0,16) : ((item.day||'') + ' ' + (item.time||''))} · ${item.platform||''}</span>
          ${item.hook ? `<span style="font-size:10px;color:#f87171">Hook: "${item.hook}"</span>` : ''}
        </div>
        <div style="font-size:12px;color:rgba(255,255,255,.8);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${escHtml(item.caption||'')}</div>
        ${(item.hashtags||[]).length ? `<div style="font-size:10px;color:#a5b4fc;margin-top:4px">${item.hashtags.slice(0,4).join(' ')}</div>` : ''}
      </div>
    </div>`).join('');
  document.getElementById('grid-preview-items').innerHTML = html;
  document.getElementById('grid-preview').style.display = 'block';
}

async function saveGrid() {
  const brandId = document.getElementById('grid-brand').value;
  if (!lastGrid.length) { toast('Genera la parrilla primero', true); return; }
  const btn = document.getElementById('grid-save-btn');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    const r = await fetch('/api/posts/bulk', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({brand_id: brandId, items: lastGrid}),
    });
    const d = await r.json();
    if (d.success) {
      toast(`✓ ${d.total} posts guardados`);
      closeGridModal();
      loadPosts();
    } else {
      toast('Error guardando: ' + d.error, true);
      btn.disabled = false;
      btn.textContent = '💾 Guardar todos';
    }
  } catch(e) {
    toast('Error: ' + e.message, true);
    btn.disabled = false;
    btn.textContent = '💾 Guardar todos';
  }
}

// Initial render
renderTable();
</script>
</body>
</html>
